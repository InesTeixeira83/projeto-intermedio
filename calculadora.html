
 <html>
 
 <link href="estilos.css" rel="stylesheet" />

<input type = "text" name = "n1"/>

<input type = "text" name = "n2"/>

<button onclick="soma()">
    +
</button>

<button onclick="tira()">
    -
</button>

<button onclick="vezes()">
    x
</button>

<button onclick="divide()">
    /
</button>

<input type="text" name="res" readonly />


<script>
    function soma() {
            let ns = gn()
            let res = document.getElementsByName('res')[0]
            res.value = Number(ns.n1) + Number(ns.n2)
    
    }


function tira(){
            let ns = gn()
            let res = document.getElementsByName('res') [0]
            res.value = Number(ns.n1) - Number(ns.n2)
    
    }

function vezes() {
            let ns = gn()
            let res = document.getElementsByName('res') [0]
            res.value = Number(ns.n1) * Number(ns.n2)
    
    }
    
function divide() {
            let ns = gn()
            let res = document.getElementsByName('res') [0]
            res.value = Number(ns.n1) / Number(ns.n2)
    
    }

function gn() {
    return {
        n1: document.getElementsByName('n1'),
        n2: document.getElementsByName('n2')
    }
}

</script>
